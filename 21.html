<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>临时邮箱自动注册 | 奕涵 · 修复跨域版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F0F2F5;
            font-family: 'Segoe UI', '微软雅黑', Roboto, sans-serif;
            padding: 24px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主容器 */
        .app-container {
            max-width: 1300px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* 头部 */
        .header {
            background: #2D3744;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .header h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .header .sub {
            color: #CBD5E0;
            font-size: 0.85rem;
        }

        /* 主体双栏 */
        .main-grid {
            display: flex;
            flex-wrap: wrap;
            padding: 24px;
            gap: 28px;
        }

        /* 左侧表单区 */
        .form-panel {
            flex: 1.2;
            min-width: 280px;
            background: #FFFFFF;
            border-radius: 20px;
        }

        /* 右侧日志区 */
        .log-panel {
            flex: 0.9;
            min-width: 260px;
            background: #F8FAFE;
            border-radius: 20px;
            border: 1px solid #E9EDF2;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .field-group {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .field-label {
            width: 70px;
            font-weight: 500;
            color: #1E293B;
            font-size: 0.9rem;
        }
        .field-input {
            flex: 1;
            min-width: 180px;
            padding: 10px 14px;
            border: 1px solid #CFDDE6;
            border-radius: 14px;
            font-size: 0.9rem;
            background: white;
            transition: 0.2s;
            outline: none;
        }
        .field-input:focus {
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0 18px;
        }
        .btn {
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            background: #F1F5F9;
            color: #1E293B;
        }
        .btn-primary {
            background: #4F46E5;
            color: white;
            box-shadow: 0 2px 4px rgba(79,70,229,0.2);
        }
        .btn-primary:hover { background: #4338CA; transform: translateY(-1px);}
        .btn-success { background: #16A34A; color: white; }
        .btn-success:hover { background: #15803D; }
        .btn-warning { background: #FF3366; color: white; }
        .btn-warning:hover { background: #E51E53; }
        .btn-secondary { background: #6B7280; color: white; }
        .btn-secondary:hover { background: #4B5563; }
        .btn-outline { background: #EFF3F8; border: 1px solid #CBD5E1; }
        .btn-outline:hover { background: #E2E8F0; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid #EDF2F7;
            font-size: 0.85rem;
        }
        .status-text {
            color: #16A34A;
            font-weight: 500;
        }
        .success-count {
            background: #EFF6FF;
            padding: 4px 12px;
            border-radius: 40px;
            color: #2563EB;
        }

        .log-header {
            padding: 16px 20px 8px 20px;
            font-weight: 600;
            border-bottom: 1px solid #E2E8F0;
            background: #F8FAFE;
        }
        .log-box {
            flex: 1;
            padding: 12px 16px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            background: #FFFFFF;
            border-radius: 16px;
            margin: 12px;
            box-shadow: inset 0 0 0 1px #E9EDF2;
            height: 320px;
        }
        .log-line {
            color: #1E2A3A;
            border-bottom: 1px solid #F0F2F5;
            padding: 6px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-info { color: #0F172A; }
        .log-success { color: #16A34A; font-weight: 500; }
        .log-error { color: #DC2626; }
        .log-warning { color: #E67E22; }

        /* 模态框 */
        .modal-mask {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            width: 320px;
            border-radius: 28px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .modal-card h3 { color: #16A34A; margin-bottom: 16px; }
        .copy-row { margin: 12px 0; display: flex; justify-content: space-between; align-items: center; background: #F8FAFE; padding: 8px 12px; border-radius: 40px; }
        .copy-btn { background: #2563EB; color: white; border: none; padding: 4px 12px; border-radius: 30px; cursor: pointer; font-size: 0.75rem; }
        .close-modal { background: #E5E7EB; border: none; padding: 8px 24px; border-radius: 40px; margin-top: 16px; cursor: pointer; }

        @media (max-width: 760px) {
            .main-grid { flex-direction: column; }
            .field-group { flex-direction: column; align-items: flex-start; }
            .field-label { width: auto; }
            .button-group { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>📧 临时邮箱自动注册 · 奕涵</h1>
        <div class="sub">只限临时注册 | 已修复跨域/发送验证码失败</div>
    </div>

    <div class="main-grid">
        <!-- 左侧表单区（经典5按钮布局） -->
        <div class="form-panel">
            <div class="field-group">
                <span class="field-label">用户名</span>
                <input type="text" id="usernameInput" class="field-input" placeholder="自动生成或手动填写">
            </div>
            <div class="field-group">
                <span class="field-label">密　码</span>
                <input type="text" id="passwordInput" class="field-input" placeholder="随机密码">
            </div>
            <div class="field-group">
                <span class="field-label">邮　箱</span>
                <input type="text" id="emailInput" class="field-input" placeholder="点击「生成邮箱」">
            </div>
            <div class="field-group">
                <span class="field-label">邀请人</span>
                <input type="text" id="inviteInput" class="field-input" placeholder="选填">
            </div>
            <div class="field-group">
                <span class="field-label">验证码</span>
                <input type="text" id="codeInput" class="field-input" placeholder="自动填写或手动">
            </div>

            <div class="button-group">
                <button id="randomBtn" class="btn btn-primary">🎲 随机账号</button>
                <button id="genEmailBtn" class="btn btn-primary" style="background:#0099FF;">📬 生成邮箱</button>
                <button id="sendCodeBtn" class="btn btn-warning">📨 发送验证码</button>
                <button id="refreshMailBtn" class="btn btn-secondary">🔄 刷新邮件</button>
                <button id="registerBtn" class="btn btn-success">✅ 立即注册</button>
            </div>

            <div class="status-bar">
                <span id="statusLabel" class="status-text">⚡ 就绪</span>
                <span id="countLabel" class="success-count">🏆 成功：0</span>
            </div>
        </div>

        <!-- 右侧日志区 -->
        <div class="log-panel">
            <div class="log-header">📋 运行日志</div>
            <div id="logContainer" class="log-box">
                <div class="log-line log-info">制作者：奕涵</div>
                <div class="log-line log-info">只限用于临时注册</div>
                <div class="log-line log-info">工具启动成功，邀请人默认不填写</div>
                <div class="log-line log-info">━━━━━━━━━━━━━━━━━━━━</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ======================== 工具函数 ========================
    function randomString(length = 8) {
        const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
        return Array.from({ length }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    }
    function randomUsername() {
        const prefixes = ['user', 'test', 'demo', 'guest', 'auto'];
        const suffix = Math.floor(Math.random() * 9000 + 1000);
        return prefixes[Math.floor(Math.random() * prefixes.length)] + suffix;
    }
    function randomPassword() {
        const lower = 'abcdefghijklmnopqrstuvwxyz';
        const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const digits = '0123456789';
        let pass = '';
        for(let i=0;i<4;i++) pass += lower[Math.floor(Math.random() * lower.length)];
        for(let i=0;i<2;i++) pass += upper[Math.floor(Math.random() * upper.length)];
        for(let i=0;i<3;i++) pass += digits[Math.floor(Math.random() * digits.length)];
        return pass.split('').sort(() => Math.random() - 0.5).join('');
    }

    // 日志管理
    const logContainer = document.getElementById('logContainer');
    function addLog(msg, type = 'info') {
        const div = document.createElement('div');
        div.className = `log-line log-${type}`;
        div.innerText = msg;
        logContainer.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        while(logContainer.children.length > 200) logContainer.removeChild(logContainer.firstChild);
    }

    // UI 元素
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const emailInput = document.getElementById('emailInput');
    const inviteInput = document.getElementById('inviteInput');
    const codeInput = document.getElementById('codeInput');
    const statusSpan = document.getElementById('statusLabel');
    const countSpan = document.getElementById('countLabel');
    let successCount = 0;

    function setStatus(text, color = '#16A34A') {
        statusSpan.innerText = text;
        statusSpan.style.color = color;
    }

    function updateCountUI() {
        countSpan.innerText = `🏆 成功：${successCount}`;
    }

    // 弹窗
    function showSuccessModal(username, password) {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal-mask';
        modalDiv.innerHTML = `
            <div class="modal-card">
                <h3>✅ 注册成功</h3>
                <div class="copy-row">账号：${escapeHtml(username)} <button class="copy-btn" data-copy="username">复制</button></div>
                <div class="copy-row">密码：${escapeHtml(password)} <button class="copy-btn" data-copy="password">复制</button></div>
                <button class="close-modal">关 闭</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const copyUserBtn = modalDiv.querySelector('[data-copy="username"]');
        const copyPwdBtn = modalDiv.querySelector('[data-copy="password"]');
        copyUserBtn.onclick = () => { navigator.clipboard.writeText(username); addLog(`✓ 账号已复制: ${username}`, 'success'); };
        copyPwdBtn.onclick = () => { navigator.clipboard.writeText(password); addLog(`✓ 密码已复制`, 'success'); };
        modalDiv.querySelector('.close-modal').onclick = () => modalDiv.remove();
        modalDiv.onclick = (e) => { if(e.target === modalDiv) modalDiv.remove(); };
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // ======================== Mail.tm API 封装 (前端版) ========================
    class MailTMApi {
        constructor() {
            this.baseUrl = 'https://api.mail.tm';
            this.token = null;
            this.address = null;
            this.password = null;
        }
        async reset() {
            this.token = null;
            this.address = null;
            this.password = null;
        }
        async getDomains() {
            try {
                const resp = await fetch(`${this.baseUrl}/domains`);
                const data = await resp.json();
                return data['hydra:member'] || [];
            } catch(e) { return []; }
        }
        async createAccount(username = null) {
            const domains = await this.getDomains();
            if(!domains.length) return null;
            const domain = domains[0].domain;
            const finalUser = username || `user${randomString(8)}`;
            const pwd = randomPassword();
            const address = `${finalUser}@${domain}`;
            try {
                const resp = await fetch(`${this.baseUrl}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, password: pwd })
                });
                if(resp.status === 201) {
                    this.address = address;
                    this.password = pwd;
                    return address;
                }
                return null;
            } catch(e) { return null; }
        }
        async getToken() {
            if(!this.address || !this.password) return null;
            try {
                const resp = await fetch(`${this.baseUrl}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: this.address, password: this.password })
                });
                if(resp.ok) {
                    const data = await resp.json();
                    this.token = data.token;
                    return this.token;
                }
                return null;
            } catch(e) { return null; }
        }
        async getMessages() {
            if(!this.token) await this.getToken();
            if(!this.token) return [];
            try {
                const resp = await fetch(`${this.baseUrl}/messages`, {
                    headers: { 'Authorization': `Bearer ${this.token}` }
                });
                const data = await resp.json();
                return data['hydra:member'] || [];
            } catch(e) { return []; }
        }
        async getMessageContent(msgId) {
            if(!this.token) await this.getToken();
            if(!this.token) return null;
            try {
                const resp = await fetch(`${this.baseUrl}/messages/${msgId}`, {
                    headers: { 'Authorization': `Bearer ${this.token}` }
                });
                return await resp.json();
            } catch(e) { return null; }
        }
        async extractSixDigitCode() {
            const messages = await this.getMessages();
            for(const msg of messages) {
                const full = await this.getMessageContent(msg.id);
                if(!full) continue;
                const text = (full.text || '') + (full.html || '');
                const matches = text.match(/\b\d{6}\b/g);
                if(matches && matches.length) {
                    for(let code of matches) {
                        if(/^\d{6}$/.test(code)) return code;
                    }
                }
            }
            return null;
        }
        async fetchAndShowMessages() {
            if(!this.address) throw new Error('没有邮箱，请先生成邮箱');
            const messages = await this.getMessages();
            if(!messages.length) {
                addLog('📭 暂无邮件', 'warning');
                return null;
            }
            for(const msg of messages) {
                const subject = msg.subject || '无标题';
                const fromAddr = msg.from?.address || '未知';
                const full = await this.getMessageContent(msg.id);
                let content = full?.text || full?.html || '';
                content = content.substring(0, 500);
                addLog(`📩 标题：${subject}`, 'info');
                addLog(`👤 发件人：${fromAddr}`, 'info');
                if(content) addLog(`📄 内容预览：${content.replace(/\n/g, ' ')}`, 'info');
                addLog(`━━━━━━━━━━━━━━━━`, 'info');
            }
            const code = await this.extractSixDigitCode();
            return code;
        }
    }

    // ======================== JSAutoTask 注册接口 (修复跨域) ========================
    class JSAutoTaskClient {
        constructor() {
            this.baseUrl = 'https://jsautotask.com';
        }
        
        // 发送验证码：优先直接请求（尝试携带完整headers），如果遇到CORS则回退到代理
        async sendEmailCode(email) {
            const url = `${this.baseUrl}/api/register/getEmail`;
            const body = JSON.stringify({ email });
            
            // 尝试1: 直接 fetch (mode: 'cors', credentials: 'include')
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json, text/plain, */*',
                        'Origin': this.baseUrl,
                        'Referer': `${this.baseUrl}/register`
                    },
                    body: body,
                    credentials: 'include',
                    mode: 'cors'
                });
                if (response.ok) {
                    const data = await response.json();
                    return data;
                }
                throw new Error(`HTTP ${response.status}`);
            } catch (directError) {
                console.warn('直接请求失败，尝试代理方式', directError);
                // 尝试2: 通过 CORS 代理 (corsproxy.io)
                try {
                    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
                    const proxyResponse = await fetch(proxyUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json, text/plain, */*'
                        },
                        body: body
                    });
                    if (proxyResponse.ok) {
                        const data = await proxyResponse.json();
                        return data;
                    }
                    throw new Error(`代理请求失败 HTTP ${proxyResponse.status}`);
                } catch (proxyError) {
                    console.error('代理也失败', proxyError);
                    return { error: '发送验证码失败，请检查网络或稍后重试', succeed: false };
                }
            }
        }
        
        // 注册：同样双重保障
        async register(username, password, email, emailCode, inviteUser = '') {
            const url = `${this.baseUrl}/api/register/register`;
            const body = JSON.stringify({
                username, password, confirmPassword: password,
                email, emailCode, inviteUser
            });
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json, text/plain, */*',
                        'Origin': this.baseUrl,
                        'Referer': `${this.baseUrl}/register`
                    },
                    body: body,
                    credentials: 'include',
                    mode: 'cors'
                });
                if (response.ok) {
                    return await response.json();
                }
                throw new Error(`HTTP ${response.status}`);
            } catch (directError) {
                console.warn('注册直接请求失败，尝试代理', directError);
                try {
                    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
                    const proxyResponse = await fetch(proxyUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: body
                    });
                    if (proxyResponse.ok) {
                        return await proxyResponse.json();
                    }
                    return { error: '注册请求失败', succeed: false };
                } catch (proxyErr) {
                    return { error: proxyErr.message, succeed: false };
                }
            }
        }
    }

    // ======================== 全局状态 ========================
    let mailApi = new MailTMApi();
    let registerClient = new JSAutoTaskClient();

    // 随机账号
    function randomAccount() {
        const user = randomUsername();
        const pwd = randomPassword();
        usernameInput.value = user;
        passwordInput.value = pwd;
        addLog(`🎲 已随机生成账号: ${user} / 密码已填`, 'success');
        setStatus('随机账号完成', '#16A34A');
    }

    // 生成邮箱
    async function generateEmail() {
        await mailApi.reset();
        addLog('📡 正在生成临时邮箱...', 'info');
        setStatus('生成中...', '#F59E0B');
        const emailAddr = await mailApi.createAccount();
        if(emailAddr) {
            emailInput.value = emailAddr;
            codeInput.value = '';
            addLog(`📧 新邮箱生成成功: ${emailAddr}`, 'success');
            addLog(`🔐 已清空历史邮件，可以等待验证码`, 'info');
            setStatus('邮箱就绪', '#16A34A');
        } else {
            addLog(`❌ 邮箱生成失败，请检查网络或稍后重试`, 'error');
            setStatus('生成失败', '#DC2626');
        }
    }

    // 发送验证码（修复版）
    async function sendVerifyCode() {
        const email = emailInput.value.trim();
        if(!email) {
            addLog('⚠️ 请先生成邮箱', 'warning');
            return;
        }
        addLog(`📨 正在发送验证码至: ${email}`, 'info');
        setStatus('发送中...', '#F59E0B');
        
        const result = await registerClient.sendEmailCode(email);
        // 兼容返回格式: { succeed: true } 或者 { data: { succeed: true } }
        let isSuccess = false;
        if(result) {
            if(result.succeed === true) isSuccess = true;
            else if(result.data && result.data.succeed === true) isSuccess = true;
            else if(result.code === 200 || result.status === 'success') isSuccess = true;
        }
        
        if(isSuccess) {
            addLog(`✅ 验证码发送成功，请稍后点击「刷新邮件」获取`, 'success');
            setStatus('验证码已发送', '#16A34A');
        } else {
            const errMsg = result?.message || result?.data?.message || result?.error || '发送失败，请重试';
            addLog(`❌ 发送失败: ${errMsg}`, 'error');
            setStatus('发送失败', '#DC2626');
        }
    }

    // 刷新邮件并自动填写验证码
    async function handleRefreshMail() {
        if(!mailApi.address) {
            addLog('❌ 请先生成邮箱', 'error');
            setStatus('请先生成邮箱', '#DC2626');
            return;
        }
        addLog('🔄 正在获取邮件并尝试识别验证码...', 'info');
        setStatus('获取邮件中...', '#F59E0B');
        try {
            const code = await mailApi.fetchAndShowMessages();
            if(code) {
                codeInput.value = code;
                addLog(`✅ 自动识别验证码: ${code}`, 'success');
                setStatus('验证码已填入', '#16A34A');
            } else {
                addLog('❌ 未识别到6位数字验证码，请手动查看邮件', 'error');
                setStatus('未找到验证码', '#DC2626');
            }
        } catch(err) {
            addLog(`刷新失败: ${err.message}`, 'error');
            setStatus('刷新失败', '#DC2626');
        }
    }

    // 立即注册
    async function handleRegister() {
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();
        const email = emailInput.value.trim();
        const code = codeInput.value.trim();
        const invite = inviteInput.value.trim();

        if(!username || !password || !email || !code) {
            addLog('⚠️ 请填写完整 (用户名/密码/邮箱/验证码)', 'warning');
            setStatus('信息不完整', '#DC2626');
            return;
        }
        
        const registerBtn = document.getElementById('registerBtn');
        registerBtn.disabled = true;
        registerBtn.innerText = '注册中...';
        addLog(`🚀 开始注册账号: ${username}`, 'info');
        setStatus('注册中...', '#F59E0B');

        try {
            const res = await registerClient.register(username, password, email, code, invite);
            if(res && (res.succeed === true || (res.data && res.data.succeed === true))) {
                successCount++;
                updateCountUI();
                addLog(`🎉 注册成功！ 账号: ${username}  密码: ${password}`, 'success');
                setStatus('注册成功', '#16A34A');
                showSuccessModal(username, password);
                // 可选清空验证码，便于下次注册
                codeInput.value = '';
            } else {
                const failReason = res?.data?.message || res?.data || res?.message || '未知错误';
                addLog(`❌ 注册失败: ${failReason}`, 'error');
                setStatus('注册失败', '#DC2626');
            }
        } catch(err) {
            addLog(`❌ 注册异常: ${err.message}`, 'error');
            setStatus('注册异常', '#DC2626');
        } finally {
            registerBtn.disabled = false;
            registerBtn.innerText = '✅ 立即注册';
        }
    }

    // 绑定UI事件
    document.getElementById('randomBtn').addEventListener('click', randomAccount);
    document.getElementById('genEmailBtn').addEventListener('click', generateEmail);
    document.getElementById('sendCodeBtn').addEventListener('click', sendVerifyCode);
    document.getElementById('refreshMailBtn').addEventListener('click', handleRefreshMail);
    document.getElementById('registerBtn').addEventListener('click', handleRegister);

    // 初始日志
    addLog('✨ 工具启动完成 | 邀请人留空即可', 'success');
    addLog('🔧 已修复跨域 & 发送验证码失败问题（自动回退代理）', 'info');
    addLog('💡 流程：生成邮箱 → 发送验证码 → 刷新邮件(自动填码) → 注册', 'info');
    setStatus('就绪', '#16A34A');
</script>
</body>
</html>
