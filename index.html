<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>临时账号注册</title>
    <link rel="icon" href="https://s41.ax1x.com/2026/03/26/peQ89k4.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366F1;
            --primary-light: #8CF8;
            --primary-dark: #4F46E5;
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-600: #4B563;
            --gray-800: #1F2937;
            --card-bg: #ffffff;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', '微软雅黑', sans-serif;
            background: url('https://s41.ax1x.com/2026/03/26/peQg4Gn.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            flex-direction: column;
        }

        .container {
            max-width: 920px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.6s ease-out;
            opacity: 0.3;
            pointer-events: none;
        }
        .container.unlocked {
            opacity: 1;
            pointer-events: all;
        }

        @keyframes fadeUp {
            from { opacity:0; transform: translateY(20px); }
            to { opacity:1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, #1E293B 0%, #334155 100%);
            padding: 24px 36px;
            color: white;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .header-left h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .header-left p {
            opacity: 0.8;
            font-size: 0.95rem;
            font-weight: 400;
        }

        .content {
            padding: 36px;
            display: flex;
            gap: 36px;
        }

        .left-section, .right-section {
            flex: 1;
            min-width: 0;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--primary);
            border-radius: 2px;
        }

        .field {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field label {
            font-weight: 500;
            color: var(--gray-600);
            font-size: 0.9rem;
        }

        .field input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--gray-50);
        }

        .field input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
            transform: translateY(-1px);
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin: 24px 0;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-secondary {
            background: var(--gray-100);
            color: var(--gray-800);
        }

        .btn-block {
            width: 100%;
            margin-top: 8px;
        }

        .log-box {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 14px;
            padding: 16px;
            height: 520px;
            max-height: 520px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.4;
            color: var(--gray-600);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-box::-webkit-scrollbar { width: 6px; }
        .log-box::-webkit-scrollbar-track { background: var(--gray-100); border-radius: 10px; }
        .log-box::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 10px; }

        .log-item { padding: 2px 0; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity:0; transform: translateX(-8px); } to { opacity:1; transform: translateX(0); } }
        .log-success { color: var(--success); }
        .log-error { color: var(--error); }
        .log-warning { color: var(--warning); }
        .log-info { color: var(--gray-600); }

        .count {
            margin-top: 16px;
            padding: 12px;
            background: rgba(99,102,241,0.1);
            border-radius: 12px;
            text-align: center;
            color: var(--primary-dark);
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .modal.show {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            animation: zoomIn 0.4s ease;
        }
        @keyframes zoomIn { from { opacity:0; transform: scale(0.9); } to { opacity:1; transform: scale(1); } }
        .modal-icon {
            width: 60px; height: 60px;
            margin: 0 auto 20px;
            background: rgba(16,185,129,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--success);
        }
        .modal-icon-error {
            background: rgba(239,68,68,0.1);
            color: var(--error);
        }
        .account-info {
            background: var(--gray-50);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        .account-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.95rem;
        }

        /* 提示弹窗专用 */
        #tipModal .modal-text { margin: 10px 0 20px; font-size: 1rem; color: #333; }

        .footer {
            margin-top: 16px;
            color: #fff;
            font-size: 0.9rem;
            opacity: 0.9;
            text-align: center;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .content { flex-direction: column; padding: 24px; gap: 24px; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-left">

</div>

<div class="footer">@2026.by 奕涵</div>

<!-- 成功弹窗 -->
<div id="successModal" class="modal">
    <div class="modal-content">
        <div class="modal-icon">✓</div>
        <h3 class="modal-title">注册成功！</h3>
        <p class="modal-text">您的临时账号已创建完成</p>
        <div class="account-info">

<!-- 提示弹窗（通用） -->

        <h3 id="tipTitle" class="modal-title">提示</h3>
        <p id="tipText" class="modal-text">消息内容</p>
        <button onclick="closeTipModal()" class="btn btn-primary btn-block">确定</button>

<!-- 进入页面强制验证弹窗 -->
<div id="initCaptchaModal" class="modal">
    <div class="modal-content" style="max-width:380px;">
        <h3 class="modal-title" style="margin-bottom:20px;">请完成安全验证</h3>
        <canvas id="initCaptchaCanvas" style="width:180px;height:70px;border-radius:10px;border:1px solid #ddd;margin-bottom:16px;"></canvas>
        <div class="field" style="margin-bottom:20px;">
            <input type="text" id="initCaptchaInput" placeholder="请输入图片验证码" style="text-align:center;font-size:16px;padding:10px;">
        </div>
        <button onclick="checkInitCaptcha()" class="btn btn-primary btn-block">确认进入</button>
    </div>
</div>

<!-- 注册二次验证弹窗 -->
<div id="regCaptchaModal" class="modal">
    <div class="modal-content" style="max-width:380px;">
        <h3 class="modal-title" style="margin-bottom:20px;">安全验证</h3>
        <canvas id="regCaptchaCanvas" style="width:180px;height:70px;border-radius:10px;border:1px solid #ddd;margin-bottom:16px;"></canvas>
        <div class="field" style="margin-bottom:20px;">
            <input type="text" id="regCaptchaInput" placeholder="请输入验证码" style="text-align:center;font-size:16px;padding:10px;">
        </div>
        <button onclick="submitRegCaptcha()" class="btn btn-primary btn-block">确认注册</button>
    </div>
</div>

<script>
    // 工具函数
    function randomString(len=8) {
        const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
        return Array.from({length:len}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
    }
    function randomUsername() {
        const prefixes = ['user','test','demo','guest','auto'];
        return prefixes[Math.floor(Math.random()*prefixes.length)] + Math.floor(Math.random()*9000+1000);
    }
    function randomPassword() {
        const lower = 'abcdefghijklmnopqrstuvwxyz';
        const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const digits = '0123456789';
        let p = '';
        for(let i=0;i<4;i++) p += lower[Math.floor(Math.random()*lower.length)];
        for(let i=0;i<2;i++) p += upper[Math.floor(Math.random()*upper.length)];
        for(let i=0;i<3;i++) p += digits[Math.floor(Math.random()*digits.length)];
        return p.split('').sort(()=>Math.random()-0.5).join('');
    }

    // 日志
    const logBox = document.getElementById('logBox');
    function addLog(msg, type='info') {
        const div = document.createElement('div');
        div.className = `log-item log-${type}`;
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
        while(logBox.children.length>500) logBox.removeChild(logBox.firstChild);
    }

    // DOM
    const usernameInp = document.getElementById('usernameInp');
    const passwordInp = document.getElementById('passwordInp');
    const emailInp = document.getElementById('emailInp');
    const codeInp = document.getElementById('codeInp');
    const inviteInp = document.getElementById('inviteInp');
    const countEl = document.getElementById('count');
    const successModal = document.getElementById('successModal');
    const tipModal = document.getElementById('tipModal');
    const tipIcon = document.getElementById('tipIcon');
    const tipTitle = document.getElementById('tipTitle');
    const tipText = document.getElementById('tipText');
    let successCount = 0;

    // 发送验证码冷却
    let codeCooldown = 0;
    let codeTimer = null;

    // 注册验证控制
    let needCaptcha = false;
    let regCaptchaCode = '';
    let tempRegisterData = null;

    // 弹窗控制
    function showTip(title, text, isSuccess=true) {
        tipTitle.textContent = title;
        tipText.textContent = text;
        if(isSuccess) {
            tipIcon.className = 'modal-icon';
            tipIcon.innerHTML = '✓';
        } else {
            tipIcon.className = 'modal-icon modal-icon-error';
            tipIcon.innerHTML = '✗';
        }
        tipModal.classList.add('show');
    }
    function closeTipModal() { tipModal.classList.remove('show'); }
    function showSuccessModal(u,p) {
        document.getElementById('modalUser').textContent = u;
        document.getElementById('modalPwd').textContent = p;
        successModal.classList.add('show');
    }
    function closeModal() { successModal.classList.remove('show'); }

    function updateCount() {
        countEl.textContent = `成功注册：${successCount} 个`;
    }

    // 自动滚动到注册按钮
    function scrollToRegisterBtn() {
        const btn = document.getElementById('registerBtn');
        if(btn) {
            btn.scrollIntoView({ behavior:'smooth', block:'center' });
        }
    }

    // ==================== 初始弹窗验证码（超大） ====================
    let initCode = '';
    function drawInitCaptcha() {
        const canvas = document.getElementById('initCaptchaCanvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0,0,w,h);

        const chars = 'ABCDEFGHJKLMNPQRSTWXY2345678';
        let code = '';
        for(let i=0;i<4;i++) code += chars[Math.floor(Math.random()*chars.length)];
        initCode = code;

        ctx.fillStyle = '#f8f9fa';
        ctx.fillRect(0,0,w,h);

        for(let i=0;i<3;i++){
            ctx.strokeStyle = `rgb(${Math.random()*80+50},${Math.random()*80+50},${Math.random()*80+50})`;
            ctx.beginPath();
            ctx.moveTo(Math.random()*w, Math.random()*h);
            ctx.lineTo(Math.random()*w, Math.random()*h);
            ctx.stroke();
        }

        ctx.font = 'bold 44px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#111';
        
        const sp = w / 5;
        for(let i=0;i<4;i++){
            ctx.fillText(code[i], sp*(i+1), h/2);
        }
        
        document.getElementById('initCaptchaInput').value = '';
    }

    function checkInitCaptcha() {
        const val = document.getElementById('initCaptchaInput').value.trim().toUpperCase();
        if(val === initCode.toUpperCase()){
            document.getElementById('initCaptchaModal').classList.remove('show');
            document.querySelector('.container').classList.add('unlocked');
        }else{
            showTip('验证失败','验证码不正确，请重试！',false);
            drawInitCaptcha();
        }
    }

    // ==================== 注册弹窗验证码 ====================
    function drawRegCaptcha() {
        const canvas = document.getElementById('regCaptchaCanvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0,0,w,h);

        const chars = 'ABCDEFGHJKLMNPQRSTWXY2345678';
        let code = '';
        for(let i=0;i<4;i++) code += chars[Math.floor(Math.random()*chars.length)];
        regCaptchaCode = code;

        ctx.fillStyle = '#f8f9fa';
        ctx.fillRect(0,0,w,h);

        for(let i=0;i<3;i++){
            ctx.strokeStyle = `rgb(${Math.random()*80+50},${Math.random()*80+50},${Math.random()*80+50})`;
            ctx.beginPath();
            ctx.moveTo(Math.random()*w, Math.random()*h);
            ctx.lineTo(Math.random()*w, Math.random()*h);
            ctx.stroke();
        }

        ctx.font = 'bold 44px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#111';
        
        const sp = w / 5;
        for(let i=0;i<4;i++){
            ctx.fillText(code[i], sp*(i+1), h/2);
        }
        
        document.getElementById('regCaptchaInput').value = '';
    }

    // ==================== 发送验证码60秒限制 ====================
    function startCodeTimer() {
        codeCooldown = 60;
        const btn = document.getElementById('sendCodeBtn');
        btn.disabled = true;
        btn.textContent = `${codeCooldown}s`;
        codeTimer = setInterval(()=>{
            codeCooldown--;
            btn.textContent = `${codeCooldown}s`;
            if(codeCooldown <=0){
                clearInterval(codeTimer);
                btn.disabled = false;
                btn.textContent = '获取';
            }
        },1000);
    }

    // Mail.tm API
    class MailTMApi {
        constructor() {
            this.baseUrl = 'https://api.mail.tm';
            this.token = null; this.address = null; this.password = null;
        }
        async reset() { this.token=null;this.address=null;this.password=null; }
        async getDomains() {
            try {
                const resp = await fetch(`${this.baseUrl}/domains`);
                const data = await resp.json();
                return data['hydra:member']||[];
            } catch(e){return[];}
        }
        async createAccount() {
            const domains = await this.getDomains();
            if(!domains.length) return null;
            const domain = domains[0].domain;
            const username = `u${randomString(8)}`;
            const pwd = randomPassword();
            const address = `${username}@${domain}`;
            try {
                const resp = await fetch(`${this.baseUrl}/accounts`,{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({address,password:pwd})
                });
                if(resp.status===201){
                    this.address=address; this.password=pwd;
                    return address;
                }
                return null;
            } catch(e){return null;}
        }
        async getToken() {
            if(!this.address||!this.password) return null;
            try {
                const resp = await fetch(`${this.baseUrl}/token`,{
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({address:this.address,password:this.password})
                });
                if(resp.ok){
                    const data=await resp.json();
                    this.token=data.token; return this.token;
                }
                return null;
            } catch(e){return null;}
        }
        async getMessages() {
            if(!this.token) await this.getToken();
            if(!this.token) return[];
            try{
                const resp=await fetch(`${this.baseUrl}/messages`,{
                    headers:{Authorization:`Bearer ${this.token}`}
                });
                const data=await resp.json();
                return data['hydra:member']||[];
            } catch(e){return[];}
        }
        async getMessageContent(msgId) {
            if(!this.token) await this.getToken();
            if(!this.token) return null;
            try{
                const resp=await fetch(`${this.baseUrl}/messages/${msgId}`,{
                    headers:{Authorization:`Bearer ${this.token}`}
                });
                return await resp.json();
            } catch(e){return null;}
        }
        async extractCode() {
            const msgs=await this.getMessages();
            for(const msg of msgs){
                const full=await this.getMessageContent(msg.id);
                if(!full) continue;
                const text=(full.text||'')+(full.html||'');
                const match=text.match(/\b\d{6}\b/g);
                if(match&&match.length) return match[0];
            }
            return null;
        }
    }

    // 注册API
    class RegisterClient {
        constructor(){this.baseUrl='https://jsautotask.com';}
        async sendEmailCode(email){
            try{
                const resp=await fetch(`${this.baseUrl}/api/register/getEmail`,{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({email})
                });
                return await resp.json();
            } catch(e){
                return {data:{succeed:false,message:'网络错误'}};
            }
        }
        async register(username,password,email,emailCode,inviteUser=''){
            try{
                const resp=await fetch(`${this.baseUrl}/api/register/register`,{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({username,password,confirmPassword:password,email,emailCode,inviteUser})
                });
                return await resp.json();
            } catch(e){
                return {succeed:false,message:'网络错误'};
            }
        }
    }

    let mailApi=new MailTMApi();
    let regClient=new RegisterClient();

    // 随机账号
    function randomAccount(){
        usernameInp.value=randomUsername();
        passwordInp.value=randomPassword();
        addLog('已随机生成账号密码','success');
    }

    // 生成邮箱
    async function generateEmail(){
        await mailApi.reset();
        addLog('正在生成新邮箱...','info');
        const email=await mailApi.createAccount();
        if(email){
            emailInp.value=email; codeInp.value='';
            addLog(`新邮箱：${email}`,'success');
        }else{
            addLog('邮箱生成失败','error');
        }
    }

    // 发送验证码
    async function sendCode(){
        if(codeCooldown>0) return;
        const email=emailInp.value.trim();
        if(!email){addLog('请先生成邮箱','warning');return;}

        addLog(`正在发送验证码到：${email}`,'info');
        startCodeTimer();
        
        const result=await regClient.sendEmailCode(email);
        if(result&&result.data&&result.data.succeed===true){
            addLog('验证码发送成功，请刷新邮件获取','success');
            showTip('发送成功','验证码已发送，请刷新邮件获取！');
        }else{
            const msg=result?.data?.message||'发送失败';
            addLog(`发送失败: ${msg}`,'error');
            showTip('发送失败',msg,false);
        }
    }

    // 刷新邮件
    async function refreshMail(){
        if(!mailApi.address){addLog('请先生成邮箱','warning');return;}
        addLog('------------------------------','info');
        addLog('正在获取邮件完整内容...','info');
        
        try{
            const msgs=await mailApi.getMessages();
            if(!msgs.length){addLog('📭 暂无邮件','warning');return;}
            for(const msg of msgs){
                const subject=msg.subject||'无标题';
                const from=msg.from?.address||'未知发件人';
                const full=await mailApi.getMessageContent(msg.id);
                const content=full?.text||full?.html||'无内容';
                addLog(`📩 发件人：${from}`,'info');
                addLog(`📌 标题：${subject}`,'info');
                addLog(`📄 内容：\n${content}`,'info');
                addLog('------------------------------','info');
            }
            const code=await mailApi.extractCode();
            if(code){
                codeInp.value=code;
                addLog(`✅ 验证码已识别：${code}`,'success');
                showTip('识别成功','验证码已填写，请点击注册！');
                setTimeout(()=>{scrollToRegisterBtn();},300);
            }else{
                addLog('❌ 未找到6位验证码','error');
            }
        }catch(e){
            addLog(`刷新失败: ${e.message}`,'error');
        }
    }

    // 真实注册
    async function doRealRegister(u,p,e,c,i){
        const btn=document.getElementById('registerBtn');
        btn.disabled=true; btn.textContent='注册中...';
        
        const res=await regClient.register(u,p,e,c,i);
        if(res.succeed){
            successCount++;
            needCaptcha = true;
            updateCount();
            addLog('========================','info');
            addLog('注册成功！','success');
            addLog(`账号：${u}`,'info');
            addLog(`密码：${p}`,'info');
            addLog('========================','info');
            showSuccessModal(u,p);
            codeInp.value = '';
        }else{
            addLog(`注册失败：${res.message||'未知错误'}`,'error');
        }
        btn.disabled=false; btn.textContent='立即注册';
    }

    // 注册
    async function doRegister(){
        const u=usernameInp.value.trim();
        const p=passwordInp.value.trim();
        const e=emailInp.value.trim();
        const c=codeInp.value.trim();
        const i=inviteInp.value.trim();
        
        if(!u||!p||!e||!c){addLog('请填写完整','warning');return;}

        // 第二次注册弹出验证码
        if(needCaptcha){
            tempRegisterData = {u,p,e,c,i};
            drawRegCaptcha();
            document.getElementById('regCaptchaModal').classList.add('show');
            return;
        }

        await doRealRegister(u,p,e,c,i);
    }

    // 提交注册验证码
    function submitRegCaptcha(){
        const val = document.getElementById('regCaptchaInput').value.trim().toUpperCase();
        if(val === regCaptchaCode.toUpperCase()){
            document.getElementById('regCaptchaModal').classList.remove('show');
            if(tempRegisterData){
                doRealRegister(tempRegisterData.u, tempRegisterData.p, tempRegisterData.e, tempRegisterData.c, tempRegisterData.i);
                tempRegisterData = null;
            }
        }else{
            showTip('验证失败','验证码不正确',false);
            drawRegCaptcha();
        }
    }

    // 绑定
    document.getElementById('randomBtn').onclick=randomAccount;
    document.getElementById('genEmailBtn').onclick=generateEmail;
    document.getElementById('sendCodeBtn').onclick=sendCode;
    document.getElementById('refreshBtn').onclick=refreshMail;
    document.getElementById('registerBtn').onclick=doRegister;

    // 初始化
    updateCount();

    // 打开页面强制弹窗验证
    window.onload = function(){
        document.getElementById('initCaptchaModal').classList.add('show');
        drawInitCaptcha();
    };
</script>
</body>
</html>
